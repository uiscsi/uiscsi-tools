version: "2"

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - gocritic
    - revive
    - misspell
    - nilerr
    - exhaustive
    - bodyclose
    - noctx
    - copyloopvar

  settings:
    staticcheck:
      checks: ["all"]
    govet:
      enable:
        - nilness
        - shadow
    revive:
      rules:
        - name: indent-error-flow
        - name: unused-parameter
        - name: unused-receiver

exclusions:
  rules:
    - path: (.+)_test\.go
      linters:
        - errcheck
